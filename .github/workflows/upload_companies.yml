name: Upload Companies to SOLR

on:
  workflow_dispatch:
    inputs:
      chunk:
        description: 'Chunk name (aaa, aab, ... aaq) or "all"'
        required: true
        default: 'aaa'

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup and Test SOLR
        env:
          SOLR_URL: ${{ secrets.SOLR_URL }}
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          chmod +x upload_to_solr.sh verify_and_delete.sh
          echo "Testing SOLR connection..."
          curl -s -u "$SOLR_USER:$SOLR_PASSWD" "$SOLR_URL/admin/ping" | grep -q "status" && echo "SOLR OK!" || { echo "SOLR FAILED!"; exit 1; }
      
      - name: Upload and verify single chunk
        if: github.event.inputs.chunk != 'all'
        env:
          SOLR_URL: ${{ secrets.SOLR_URL }}
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
          CHUNK_NAME: ${{ github.event.inputs.chunk }}
        run: |
          echo "Processing chunk_$CHUNK_NAME.csv"
          bash verify_and_delete.sh "data_sources/chunk_$CHUNK_NAME.csv" "$SOLR_URL" "$SOLR_USER" "$SOLR_PASSWD"
      
      - name: Upload and verify all chunks
        if: github.event.inputs.chunk == 'all'
        env:
          SOLR_URL: ${{ secrets.SOLR_URL }}
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          for f in data_sources/chunk_*.csv; do
            echo "=== Processing $f ==="
            bash verify_and_delete.sh "$f" "$SOLR_URL" "$SOLR_USER" "$SOLR_PASSWD"
          done
