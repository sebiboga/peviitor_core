name: Upload Companies to SOLR

on:
  workflow_dispatch:
    inputs:
      chunk:
        description: 'Chunk to process (1-67, or "all")'
        required: true
        default: '1'

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup
        run: |
          chmod +x upload_to_solr.sh
          ls data_sources/
      
      - name: Upload single chunk
        if: github.event.inputs.chunk != 'all'
        env:
          SOLR_URL: ${{ secrets.SOLR_URL }}
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASS: ${{ secrets.SOLR_PASS }}
        run: |
          echo "Processing chunk_aaa.csv"
          bash upload_to_solr.sh "data_sources/chunk_aaa.csv" "$SOLR_URL" "$SOLR_USER" "$SOLR_PASS"
      
      - name: Upload all chunks
        if: github.event.inputs.chunk == 'all'
        env:
          SOLR_URL: ${{ secrets.SOLR_URL }}
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASS: ${{ secrets.SOLR_PASS }}
        run: |
          for f in data_sources/chunk_*.csv; do
            echo "Processing $f..."
            bash upload_to_solr.sh "$f" "$SOLR_URL" "$SOLR_USER" "$SOLR_PASS"
          done
